version: 2

updates:
  - package-ecosystem: npm
    directory: /
    target-branch: main
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Europe/London
    open-pull-requests-limit: 10
    rebase-strategy: auto
    versioning-strategy: increase-if-necessary
    labels:
      - dependencies
    reviewers:
      - Lostepic
    commit-message:
      prefix: deps
      include: scope
    groups:
      electron-forge:
        patterns:
          - "@electron-forge/*"
      production-dependencies:
        dependency-type: production
        update-types:
          - minor
          - patch
      development-dependencies:
        dependency-type: development
        update-types:
          - minor
          - patch
      production-major-updates:
        dependency-type: production
        update-types:
          - major
      development-major-updates:
        dependency-type: development
        update-types:
          - major
  - package-ecosystem: github-actions
    directory: /
    target-branch: main
    schedule:
      interval: weekly
      day: monday
      time: "06:30"
      timezone: Europe/London
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - github-actions
    reviewers:
      - Lostepic
    commit-message:
      prefix: ci
      include: scope
    groups:
      github-actions:
        patterns:
          - "*"
