name: Build

on:
  push:
    branches: [development, main]
  pull_request:
    branches: [development, main]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality checks
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 22
      - run: corepack enable
      - run: yarn install --immutable
      - run: yarn check

  package:
    name: Package (${{ matrix.os }})
    needs: quality
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: linux
          - os: windows-latest
            artifact: windows
          - os: macos-latest
            artifact: macos
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 22
      - run: corepack enable
      - run: yarn install --immutable
      - run: yarn package
      - uses: actions/upload-artifact@v7
        with:
          name: package-${{ matrix.artifact }}
          path: out/**
          retention-days: 7
