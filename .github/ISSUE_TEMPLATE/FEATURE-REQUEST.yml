name: Feature request
description: Propose an improvement for YTM Desktop
title: "[Feature]: "
labels: [enhancement]
body:
  - type: checkboxes
    attributes:
      label: Before submitting
      options:
        - label: I searched open and closed issues for this suggestion.
          required: true
  - type: textarea
    attributes:
      label: Problem or use case
      description: What limitation would this feature address?
    validations:
      required: true
  - type: textarea
    attributes:
      label: Proposed solution
      description: Describe the desired behaviour and user experience.
    validations:
      required: true
  - type: textarea
    attributes:
      label: Alternatives considered
      description: Describe any other approaches or workarounds.
  - type: textarea
    attributes:
      label: Additional context
      description: Add mock-ups, examples, or related references when useful.
