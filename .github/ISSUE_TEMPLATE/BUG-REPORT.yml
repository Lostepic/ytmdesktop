name: Bug report
description: Report a reproducible problem with YTM Desktop
title: "[Bug]: "
labels: [bug]
body:
  - type: checkboxes
    attributes:
      label: Before submitting
      options:
        - label: I searched open and closed issues for this problem.
          required: true
        - label: I understand that YTM Desktop is not affiliated with Google or YouTube.
          required: true
  - type: input
    attributes:
      label: YTM Desktop version
      description: Shown in Settings → About.
      placeholder: 3.0.0
    validations:
      required: true
  - type: dropdown
    attributes:
      label: Operating system
      options: [Windows, macOS, Linux]
    validations:
      required: true
  - type: input
    attributes:
      label: Operating system version
      placeholder: Windows 11 24H2
    validations:
      required: true
  - type: dropdown
    attributes:
      label: Architecture
      options: [x64, arm64]
    validations:
      required: true
  - type: textarea
    attributes:
      label: Problem
      description: Explain what happened and what you expected instead.
    validations:
      required: true
  - type: textarea
    attributes:
      label: Reproduction steps
      placeholder: |
        1. Open ...
        2. Enable ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    attributes:
      label: Additional context
      description: Add relevant screenshots or redacted logs. Never include passwords or tokens.
